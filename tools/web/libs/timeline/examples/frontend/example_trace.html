<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Request Trace</title>
    <link rel="stylesheet" href="../../cptools_web/resources/css/tree-timeline-renderer.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            color: #212529;
            margin-bottom: 0.5rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>API Request Trace</h1>
        </div>
        <div class="controls">
            <button class="btn" onclick="renderer.expandAll()">Expand All</button>
            <button class="btn" onclick="renderer.collapseAll()">Collapse All</button>
        </div>
        <div id="timeline-container"></div>
    </div>
    
    <script src="../../cptools_web/resources/js/tree-timeline-renderer.js"></script>
    <script>
        const traceData = {
  "id": "trace-1",
  "name": "API Request",
  "type": "TRACE",
  "start_ms": 0,
  "end_ms": 5500,
  "children": [
    {
      "id": "span-1",
      "name": "Authentication",
      "type": "SPAN",
      "start_ms": 0,
      "end_ms": 880,
      "children": [
        {
          "id": "span-1-1",
          "name": "Validate Token",
          "type": "SPAN",
          "start_ms": 2,
          "end_ms": 880,
          "children": [
            {
              "id": "span-1-1-1",
              "name": "Parse JWT",
              "type": "SPAN",
              "start_ms": 5,
              "end_ms": 8,
              "children": []
            },
            {
              "id": "gen-1-1-2",
              "name": "Check Signature",
              "type": "GENERATION",
              "start_ms": 10,
              "end_ms": 870,
              "children": []
            }
          ]
        }
      ]
    },
    {
      "id": "span-2",
      "name": "Database Query",
      "type": "SPAN",
      "start_ms": 900,
      "end_ms": 3500,
      "children": [
        {
          "id": "span-2-1",
          "name": "Connect",
          "type": "SPAN",
          "start_ms": 904,
          "end_ms": 920,
          "children": []
        },
        {
          "id": "gen-2-2",
          "name": "Execute Query",
          "type": "GENERATION",
          "start_ms": 925,
          "end_ms": 3480,
          "children": []
        }
      ]
    },
    {
      "id": "span-3",
      "name": "Response Generation",
      "type": "SPAN",
      "start_ms": 3600,
      "end_ms": 5500,
      "children": [
        {
          "id": "span-3-1",
          "name": "Format Data",
          "type": "SPAN",
          "start_ms": 3610,
          "end_ms": 3800,
          "children": []
        },
        {
          "id": "gen-3-2",
          "name": "Serialize JSON",
          "type": "GENERATION",
          "start_ms": 3850,
          "end_ms": 5450,
          "children": []
        }
      ]
    }
  ]
};
        
        const renderer = new TreeTimelineRenderer({
            container: '#timeline-container',
            onNodeClick: (node) => {
                console.log('Node clicked:', node);
            }
        });
        
        renderer.render(traceData);
    </script>
</body>
</html>
