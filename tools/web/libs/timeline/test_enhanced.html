        const renderer = new TreeTimelineRenderer({
            container: '#timeline-container',
            showGridLines: true,
            performanceThresholds: {
                ttft_excellent: 500,
                ttft_good: 1000

            onNodeClick: (node) => {
                console.log('Node clicked:', node);

        renderer.render(testData);
