- name: assistant_runtime
  aliases:
    - assistant-runtime
    - air
    - assistant runtime
    - runtime
  index_candidates:
    - "*:*-logs-air_assistant_runtime-*"
  entry_fields:
    - sessionId
    - conversationId
    - accountId
  evidence_fields:
    - message
    - sessionId
    - conversationId
    - accountId
  default_enabled: true

