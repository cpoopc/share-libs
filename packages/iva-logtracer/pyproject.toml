[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "iva-logtracer"
version = "0.1.0"
description = "IVA/Nova session tracing and debugging tools"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    "cptools-common @ git+ssh://git@github.com/cpoopc/share-libs.git@main#subdirectory=tools/python/libs/common",
    "cptools-kibana @ git+ssh://git@github.com/cpoopc/share-libs.git@main#subdirectory=tools/python/libs/kibana",
    "cptools-web-libs-timeline @ git+ssh://git@github.com/cpoopc/share-libs.git@main#subdirectory=tools/web/libs/timeline",
    "jinja2>=3.1.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]
web = [
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
]

[project.scripts]
iva-logtracer = "logtracer_extractors.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["logtracer_extractors*", "utils*"]

[tool.setuptools.package-data]
logtracer_extractors = [
    "iva/components.yaml",
    "iva/correlation_graph.yaml",
]
