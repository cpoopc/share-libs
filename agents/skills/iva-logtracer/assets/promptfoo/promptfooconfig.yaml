# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: 'iva-logtracer skill routing regression suite'

prompts:
  - file://../../scripts/promptfoo/create_prompt.py:create_prompt

providers:
  - id: openai:gpt-5.4-mini
    label: openai-gpt-5.4-mini
    config:
      temperature: 0
      max_completion_tokens: 600
      apiKeyEnvar: OPENAI_API_KEY

tests:
  - path: file://../../scripts/promptfoo/generate_tests.py:create_tests
    config:
      dataset: assets/eval-dataset.jsonl

defaultTest:
  assert:
    - type: is-json
    - type: python
      value: file://../../scripts/promptfoo/assert_route.py:check_route
